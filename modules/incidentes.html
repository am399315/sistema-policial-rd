<!-- ================================================
     MÓDULO: INCIDENTES
================================================ -->

<div class="modulo-incidentes animate-fadeIn">

  <!-- Barra de herramientas -->
  <div class="modulo-toolbar">
    <div class="search-bar" role="search" aria-label="Buscar incidentes">
      <span class="search-bar__icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="incidentes-search"
        class="search-bar__input"
        placeholder="Buscar por tipo, ubicación..."
        aria-label="Buscar incidentes"
        autocomplete="off"
      />
    </div>

    <select id="incidentes-gravedad-filter" class="form-input form-select" style="width:160px;" aria-label="Filtrar por gravedad">
      <option value="">Toda gravedad</option>
      <option value="alta">Alta</option>
      <option value="media">Media</option>
      <option value="baja">Baja</option>
    </select>

    <button id="btn-nuevo-incidente" class="btn btn--primary" aria-label="Registrar nuevo incidente">
      <span aria-hidden="true">⚠️</span>
      <span data-i18n="incidentes.nuevo">Nuevo Incidente</span>
    </button>
  </div>

  <!-- Resumen de incidentes -->
  <div class="grid-3 mt-md mb-md">
    <div class="stat-card">
      <div class="stat-card__icon" aria-hidden="true">🔴</div>
      <div class="stat-card__value">4</div>
      <div class="stat-card__label">Alta Gravedad</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon" aria-hidden="true">🟡</div>
      <div class="stat-card__value">3</div>
      <div class="stat-card__label">Gravedad Media</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon" aria-hidden="true">🟢</div>
      <div class="stat-card__value">3</div>
      <div class="stat-card__label">Resueltos Hoy</div>
    </div>
  </div>

  <!-- Tabla de incidentes -->
  <div class="card">
    <div class="card__header">
      <div>
        <div class="card__title" data-i18n="incidentes.title">Gestión de Incidentes</div>
        <div class="card__subtitle">Registro y seguimiento de incidentes activos</div>
      </div>
      <span class="badge badge--warning">10 registros</span>
    </div>

    <div class="data-table-wrap">
      <table class="data-table" role="grid" aria-label="Tabla de incidentes">
        <thead>
          <tr>
            <th scope="col">ID</th>
            <th scope="col" data-i18n="incidentes.tipo">Tipo</th>
            <th scope="col" data-i18n="incidentes.ubicacion">Ubicación</th>
            <th scope="col" data-i18n="incidentes.gravedad">Gravedad</th>
            <th scope="col" data-i18n="incidentes.fecha">Fecha/Hora</th>
            <th scope="col" data-i18n="incidentes.estado">Estado</th>
            <th scope="col" data-i18n="casos.acciones">Acciones</th>
          </tr>
        </thead>
        <tbody id="incidentes-tbody">
          <!-- Se llena con JavaScript -->
        </tbody>
      </table>
    </div>

    <div class="pagination" role="navigation" aria-label="Paginación de incidentes">
      <button class="page-btn" aria-label="Página anterior">‹</button>
      <button class="page-btn page-btn--active" aria-current="page">1</button>
      <button class="page-btn" aria-label="Página siguiente">›</button>
    </div>
  </div>

</div>


<style>
  .modulo-toolbar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .modulo-toolbar .search-bar { flex: 1; min-width: 200px; }
  .form-grid-modal {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
</style>
